services:
  - type: web
    name: onepage
    runtime: node
    plan: free
    buildCommand: npm install && npm run build -w client && npm run prisma:generate -w server && npm run prisma:deploy -w server
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
