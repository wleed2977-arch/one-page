databases:
  - name: onepage-db
    plan: free
    databaseName: onepage
    user: onepage

services:
  - type: web
    name: onepage
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && rm -f server/.env server/prisma/.env && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: onepage-db
          property: connectionString
