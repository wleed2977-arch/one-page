services:
  - type: web
    name: onepage
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build && npm run prisma:deploy -w server
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: file:/opt/render/project/src/server/prisma/dev.db
